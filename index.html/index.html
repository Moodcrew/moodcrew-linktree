<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Moodcrew | Links</title>
    <style>
        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            /* WICHTIG: Kein fixed background auf Handys für flüssiges Scrollen */
            background-color: #111;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        /* Das Bild wird jetzt als eigene Ebene hinter alles gelegt */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('Moodcrewball_von_der_seite.png') no-repeat center center;
            background-size: cover;
            z-index: -2; /* Ganz nach hinten */
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1; /* Vor dem Bild, hinter dem Content */
        }

        .content {
            position: relative;
            width: 100%;
            max-width: 320px; 
            margin: 0 auto;
            padding: 50px 15px 100px 15px;
            text-align: center;
            /* Ermöglicht natürliches Scrollen */
            min-height: 101vh; 
        }

        .profile-img-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-img-inner {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .username { font-size: 1.3rem; font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin-bottom: 5px; }
        .bio { font-size: 0.95rem; margin-bottom: 35px; opacity: 0.9; text-shadow: 1px 1px 3px rgba(0,0,0,1); line-height: 1.4; }

        /* BUTTONS */
        .link-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            margin-bottom: 12px;
            border-radius: 50px;
            transition: all 0.3s ease; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            width: 100%;
            height: 85px;
            position: relative;
            color: white !important;
            -webkit-tap-highlight-color: transparent; 
        }

        .link-item:active { transform: scale(0.96); }

        .bg-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-repeat: no-repeat;
            background-position: center;
            transition: background-size 0.6s ease-out, background-position 0.6s ease-out; 
            z-index: 1;
        }

        .link-item::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 2;
        }

        .btn-title, .btn-url { 
            position: relative;
            z-index: 3;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
        }
        .btn-title { font-weight: 900; text-transform: uppercase; font-size: 1rem; }
        .btn-url { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }

        /* SHOP BUTTON */
        .shop-btn { border: 2px solid #ff4500; }
        .shop-btn .bg-layer {
            background-image: url('Moodcrew_Shopbutton_hintergrund.png');
            background-size: 400% auto;
        }
        .shop-btn:hover .bg-layer { background-size: 350% auto; }

        /* SOCIAL BUTTONS */
        .social-btn { border: 2px solid rgba(144, 238, 144, 0.6); }
        .social-btn .bg-layer {
            background-image: url('Moodcrewball_von_der_seite.png');
            background-size: 430% auto;
            background-position: center 20%;
        }
        .social-btn:hover .bg-layer { 
            background-size: 380% auto; 
            background-position: center 50%; 
        }

        /* CREW-BUTTONS */
        .milky-btn {
            background-color: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .milky-btn::before { display: none; }
        .milky-btn:hover { background-color: rgba(255, 255, 255, 0.2); }
        .milky-btn .btn-title { text-shadow: none; font-size: 0.9rem; }

        .divider { 
            margin: 40px 0 15px; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: bold; 
            opacity: 0.7;
        }
        
        .footer { margin-top: 50px; font-size: 0.65rem; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="overlay"></div>

    <div class="content">
        <div class="profile-img-container">
            <img src="Moodcrew_ausgeschnittener_Ball.png" alt="Moodcrew Ball" class="profile-img-inner">
        </div>

        <div class="username">@moodcrewde</div>
        <div class="bio">Hol Dir den MELONBALL!<br>Folge uns um nichts zu verpassen!</div>

        <a href="https://www.moodcrew.de" target="_blank" class="link-item shop-btn">
            <div class="bg-layer"></div>
            <span class="btn-title">🏀 ZUM MOODCREW SHOP</span>
            <span class="btn-url">www.moodcrew.de</span>
        </a>

        <a href="https://www.tiktok.com/@moodcrewde" target="_blank" class="link-item social-btn">
            <div class="bg-layer"></div>
            <span class="btn-title">📱 Moodcrew TIKTOK</span>
            <span class="btn-url">tiktok.com/@moodcrewde</span>
        </a>

        <a href="https://www.instagram.com/moodcrew.de/" target="_blank" class="link-item social-btn">
            <div class="bg-layer"></div>
            <span class="btn-title">📸 Moodcrew INSTAGRAM</span>
            <span class="btn-url">instagram.com/moodcrew.de</span>
        </a>

        <div class="divider">The Crew</div>

        <a href="https://www.instagram.com/marlon.mlg/" target="_blank" class="link-item milky-btn">
            <span class="btn-title">👤 Marlon's Private Insta</span>
        </a>

        <a href="https://www.instagram.com/joscha.wgl/" target="_blank" class="link-item milky-btn">
            <span class="btn-title">👤 Joscha's Private Insta</span>
        </a>

        <div class="footer">© 2026 MOODCREW</div>
    </div>

</body>
</html>
